services:
  db:
    image: mariadb:10.11
    restart: unless-stopped
    environment:
      MARIADB_ROOT_PASSWORD: root
      MARIADB_DATABASE: wp
      MARIADB_USER: wp
      MARIADB_PASSWORD: wp
    volumes:
      - db_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 5s
      timeout: 5s
      retries: 20

  wp:
    image: wordpress:6.7
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "8080:80"
    environment:
      WORDPRESS_DB_HOST: db:3306
      WORDPRESS_DB_USER: wp
      WORDPRESS_DB_PASSWORD: wp
      WORDPRESS_DB_NAME: wp
      WORDPRESS_DEBUG: "1"
      WORDPRESS_CONFIG_EXTRA: |
        define('WP_DEBUG_LOG', true);
        define('WP_DEBUG_DISPLAY', false);
    volumes:
      - wp_files:/var/www/html
      - ./:/var/www/html/wp-content/plugins/wp-olonjs
      - ./docker/my.cnf:/etc/mysql/conf.d/wp-olonjs.cnf:ro

  # One-shot: composer install / update inside the plugin directory.
  # Usage:  docker compose run --rm composer install
  composer:
    image: composer:2
    working_dir: /app
    volumes:
      - ./:/app
    profiles: ["tools"]

  # One-shot: WP-CLI. Mounts the same wp_files volume the wp service uses.
  # Usage:  docker compose run --rm wpcli wp <command>
  #         docker compose run --rm wpcli /scripts/seed.sh
  wpcli:
    image: wordpress:cli
    depends_on:
      db:
        condition: service_healthy
      wp:
        condition: service_started
    environment:
      WORDPRESS_DB_HOST: db:3306
      WORDPRESS_DB_USER: wp
      WORDPRESS_DB_PASSWORD: wp
      WORDPRESS_DB_NAME: wp
    volumes:
      - wp_files:/var/www/html
      - ./:/var/www/html/wp-content/plugins/wp-olonjs
      - ./docker/scripts:/scripts
      - ./docker/my.cnf:/etc/mysql/conf.d/wp-olonjs.cnf:ro
      - ./docker/my.cnf:/etc/my.cnf.d/wp-olonjs.cnf:ro
    user: "33:33"
    profiles: ["tools"]

volumes:
  db_data:
  wp_files:
